function inferGenres(artists) {
  const g={};
  artists.forEach(a=>{
    const name=a.name.toLowerCase();
    if(ARTIST_GENRE_MAP[name]){ARTIST_GENRE_MAP[name].forEach(x=>{g[x]=(g[x]||0)+2;});return;}
    for(const [key,genres] of Object.entries(ARTIST_GENRE_MAP)){
      if(name.includes(key)||key.includes(name)){genres.forEach(x=>{g[x]=(g[x]||0)+1;});break;}
    }
  });
  return Object.entries(g).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
}

function setDebug(msg){console.log('[FW]',msg);const el=document.getElementById('debug-bar');if(el)el.textContent='🎵 '+msg;}

function generateCodeVerifier(length=128){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let r='';crypto.getRandomValues(new Uint8Array(length)).forEach(v=>{r+=chars[v%chars.length];});return r;
}
async function generateCodeChallenge(v){
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function initiateLogin(){
  const v=generateCodeVerifier();localStorage.setItem('pkce_verifier',v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT_URI,
    code_challenge_method:'S256',code_challenge:await generateCodeChallenge(v),scope:SCOPES,show_dialog:'true'});
  window.location.href=`https://accounts.spotify.com/authorize?${p}`;
}
async function exchangeToken(code){
  const v=localStorage.getItem('pkce_verifier');if(!v)throw new Error('No PKCE verifier');
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,code_verifier:v})});
  const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.error||'Token failed');
  localStorage.removeItem('pkce_verifier');return d;
}

async function fetchAllData(token,timeRange){
  setDebug('Fetching '+timeRange+'...');
  const h={Authorization:`Bearer ${token}`};
  const get=async(url)=>{try{const r=await fetch(url,{headers:h});if(!r.ok)return null;return await r.json();}catch(e){return null;}};
  const [tracksData,artistsData,profileData,recentData]=await Promise.all([
    get(`https://api.spotify.com/v1/me/top/tracks?limit=50&time_range=${timeRange}`),
    get(`https://api.spotify.com/v1/me/top/artists?limit=50&time_range=${timeRange}`),
    get('https://api.spotify.com/v1/me'),
    get('https://api.spotify.com/v1/me/player/recently-played?limit=50'),
  ]);
  const tracks=tracksData?.items||[];
  const artists=artistsData?.items||[];
  const recentTracks=(recentData?.items||[]).map(i=>({...i.track,played_at:i.played_at}));
  const spotifyGenreMap={};
  artists.forEach(a=>(a.genres||[]).forEach(g=>{spotifyGenreMap[g]=(spotifyGenreMap[g]||0)+1;}));
  const spotifyGenres=Object.entries(spotifyGenreMap).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  const genres=spotifyGenres.length>0?spotifyGenres:inferGenres(artists);
  setDebug(`${tracks.length} tracks · ${artists.length} artists · ${genres.length} genres`);
  const albumMap={};
  tracks.forEach(t=>{const a=t.album;if(!a?.id)return;if(!albumMap[a.id])albumMap[a.id]={...a,trackCount:0};albumMap[a.id].trackCount++;});
  const albums=Object.values(albumMap).sort((a,b)=>b.trackCount-a.trackCount);
  return{tracks,artists,albums,recentTracks,genres,profile:profileData||{}};
}

function getTopDecade(tracks){
  const d={};tracks.forEach(t=>{const y=parseInt((t.album?.release_date||'2000').slice(0,4));const dec=Math.floor(y/10)*10;d[dec]=(d[dec]||0)+1;});
  const s=Object.entries(d).sort((a,b)=>b[1]-a[1]);return s.length>0?s[0][0]+'s':null;
}
function getDecadeBreakdown(tracks){
  const d={};tracks.forEach(t=>{const y=parseInt((t.album?.release_date||'2000').slice(0,4));const dec=Math.floor(y/10)*10;d[dec]=(d[dec]||0)+1;});
  const s=Object.entries(d).sort((a,b)=>b[1]-a[1]).slice(0,4);const max=s[0]?.[1]||1;
  return s.map(([dec,c])=>({decade:dec+'s',count:c,pct:Math.round((c/max)*100)}));
}
function timeAgo(ds){
  const diff=Date.now()-new Date(ds).getTime(),m=Math.floor(diff/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';
}
function rankClass(i){return['rank-1','rank-2','rank-3'][i]||'rank-other';}

function LoadingScreen({message='Loading…'}){
  return <div className="loading-screen"><div className="loading-bars">{[1,2,3,4,5].map(i=><span key={i}/>)}</div><p className="loading-text">{message}</p></div>;
}
function LoginScreen(){
  const sp="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z";
  return(
    <div className="login-screen">
      <div className="logo-mark"><svg viewBox="0 0 24 24"><path d={sp}/></svg></div>
      <h1 className="login-title">Forever<br/><span>Wrapped</span></h1>
      <p className="login-subtitle">Your Spotify listening history, beautifully visualized — for any time period, any time.</p>
      <button className="btn-login" onClick={initiateLogin}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d={sp}/></svg>Connect with Spotify
      </button>
      <div className="login-features">
        {['Top Tracks','Top Artists','Top Albums','Recently Played'].map(f=>(
          <div className="feature-pill" key={f}><span className="dot"/>{f}</div>
        ))}
      </div>
    </div>
  );
}
function TimeSelector({value,onChange}){
  return(
    <div className="time-selector">
      {[['short_term','Last 4 Weeks'],['medium_term','Last 6 Months'],['long_term','All Time']].map(([v,l])=>(
        <button key={v} className={`time-btn ${value===v?'active':''}`} onClick={()=>onChange(v)}>{l}</button>
      ))}
    </div>
  );
}
function TrackRow({track,index,showTime}){
  return(
    <div className="track-card" onClick={()=>window.open(track.external_urls?.spotify,'_blank')}>
      <span className={`track-rank ${rankClass(index)}`}>#{index+1}</span>
      <img className="track-art" src={track.album?.images?.[0]?.url||''} alt={track.name} onError={e=>{e.target.src='https://via.placeholder.com/52/222/555?text=♪';}}/>
      <div className="track-info">
        <div className="track-name">{track.name}</div>
        <div className="track-artist">{(track.artists||[]).map(a=>a.name).join(', ')}</div>
        {showTime&&track.played_at&&<div className="track-meta">{timeAgo(track.played_at)}</div>}
      </div>
      {!showTime&&<div className="track-bar-wrap"><div className="track-bar" style={{width:`${track.popularity||60}%`}}/></div>}
      {showTime&&<span className="badge">RECENT</span>}
    </div>
  );
}
function ArtistCard({artist,index}){
  return(
    <div className="artist-card" onClick={()=>window.open(artist.external_urls?.spotify,'_blank')}>
      <span className="artist-rank-badge">#{index+1}</span>
      <img className="artist-img" src={artist.images?.[0]?.url||''} alt={artist.name} onError={e=>{e.target.src='https://via.placeholder.com/80/222/555?text=♪';}}/>
      <div className="artist-name">{artist.name}</div>
      <div className="artist-sub">{(artist.genres||[])[0]||'Artist'}</div>
    </div>
  );
}
function AlbumCard({album}){
  const year=(album.release_date||'').slice(0,4);
  return(
    <div className="album-card" onClick={()=>window.open(album.external_urls?.spotify,'_blank')}>
      <img className="album-img" src={album.images?.[0]?.url||''} alt={album.name} onError={e=>{e.target.src='https://via.placeholder.com/200/222/555?text=♪';}}/>
      <div className="album-name">{album.name}</div>
      <div className="album-artist">{(album.artists||[]).map(a=>a.name).join(', ')}</div>
      {year&&<div className="album-year">{year}</div>}
    </div>
  );
}

function ShowMoreSection({title,items,renderItem,initialCount=5,step=5,containerClass,gridClass}){
  const [visible,setVisible]=useState(initialCount);
  useEffect(()=>{setVisible(initialCount);},[items,initialCount]);
  const shown=items.slice(0,visible);
  const remaining=items.length-visible;
  const cls=containerClass||gridClass||'track-list';
  return(
    <div className="section-wrap">
      <div className="section-title">{title}</div>
      <div className={cls}>{shown.map((item,i)=>renderItem(item,i))}</div>
      {remaining>0&&(
        <button className="btn-more" onClick={()=>setVisible(v=>Math.min(v+step,items.length))}>
          + Show {Math.min(step,remaining)} more
        </button>
      )}
    </div>
  );
}

function VibeBanner({tracks,genres}){
  const topDecade=getTopDecade(tracks);
  const breakdown=getDecadeBreakdown(tracks);
  const topGenres=genres.slice(0,6);
  return(
    <div className="vibe-banner">
      <div className="vibe-left">
        <div className="vibe-eyebrow">Your Music Era</div>
        <div className="vibe-value">{topDecade||'Mixed'}</div>
        <div className="vibe-desc">Based on your top track release years</div>
        {topGenres.length>0?(
          <><div className="vibe-eyebrow" style={{marginTop:16}}>Top Genres</div>
          <div className="genre-tags">{topGenres.map(g=><span className="genre-tag" key={g}>{g}</span>)}</div></>
        ):(
          <div className="vibe-desc" style={{marginTop:10,fontStyle:'italic',opacity:0.6}}>Genre data unavailable</div>
        )}
      </div>
      {breakdown.length>0&&(
        <div className="decade-bars">
          {breakdown.map(({decade,count,pct})=>(
            <div className="decade-row" key={decade}>
              <span className="decade-label">{decade}</span>
              <div className="decade-bar-wrap"><div className="decade-bar" style={{width:pct+'%'}}/></div>
              <span className="decade-count">{count}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Dashboard({token,onLogout}){
  const [timeRange,setTimeRange]=useState('medium_term');
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [showCopied,setShowCopied]=useState(false);
  const load=useCallback(async()=>{
    setLoading(true);setError(null);setData(null);
    try{setData(await fetchAllData(token,timeRange));}
    catch(e){if(e.message==='TOKEN_EXPIRED')onLogout();else setError(e.message);}
    finally{setLoading(false);}
  },[token,timeRange]);
  useEffect(()=>{load();},[load]);
  if(loading)return <LoadingScreen message="Fetching your music data…"/>;
  const tracks=data?.tracks||[],artists=data?.artists||[],albums=data?.albums||[];
  const recent=data?.recentTracks||[],genres=data?.genres||[],profile=data?.profile||{};
  const hasData=tracks.length>0||artists.length>0;
  const topDecade=getTopDecade(tracks);
  const handleShare=()=>{
    const text=`🎵 My Forever Wrapped:\n#1 Track: ${tracks[0]?.name||'?'}\n#1 Artist: ${artists[0]?.name||'?'}\nTop Genre: ${genres[0]||'N/A'}\nTop Era: ${topDecade||'Mixed'}\n\nforever-wrapped.onrender.com`;
    navigator.clipboard.writeText(text).then(()=>{setShowCopied(true);setTimeout(()=>setShowCopied(false),2600);});
  };
  const tweetShare=()=>{
    const text=encodeURIComponent(`🎵 My #ForeverWrapped: Top Artist is ${artists[0]?.name||'?'} — ${genres[0]||'good music'} in the ${topDecade||'past'} 🎶`);
    window.open(`https://twitter.com/intent/tweet?text=${text}`,'_blank');
  };
  return(
    <div className="dashboard">
      <div className="dash-header">
        <div className="dash-brand"><div className="dash-brand-dot"/><div className="dash-brand-name">Forever<span>Wrapped</span></div></div>
        <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          {profile.display_name&&(
            <div className="user-pill">
              <img className="user-avatar" src={profile.images?.[0]?.url||''} alt={profile.display_name} onError={e=>{e.target.style.display='none';}}/>
              <span className="user-name">{profile.display_name}</span>
            </div>
          )}
          <button className="btn-logout" onClick={onLogout}>Sign out</button>
        </div>
      </div>
      <TimeSelector value={timeRange} onChange={setTimeRange}/>
      {error&&<div className="error-card">⚠️ {error} <button onClick={load} style={{background:'none',border:'none',color:'inherit',cursor:'pointer',textDecoration:'underline',marginLeft:8}}>Retry</button></div>}
      {!error&&!hasData&&(
        <div className="empty-state">
          <div className="emoji">🎵</div><h2>Not enough listening history</h2>
          <p>Try <strong>All Time</strong> or listen to more music and check back!</p>
          <div className="time-selector" style={{justifyContent:'center',marginTop:24}}>
            {[['short_term','Last 4 Weeks'],['medium_term','Last 6 Months'],['long_term','All Time']].map(([v,l])=>(
              <button key={v} className={`time-btn ${timeRange===v?'active':''}`} onClick={()=>setTimeRange(v)}>{l}</button>
            ))}
          </div>
        </div>
      )}
      {!error&&hasData&&(
        <>
          <div className="hero-section">
            <div className="hero-card">
              <div className="hero-label">🎵 Top Track</div>
              {tracks[0]&&<><img className="hero-img" src={tracks[0].album?.images?.[0]?.url||''} alt={tracks[0].name} onError={e=>{e.target.src='https://via.placeholder.com/72/222/555?text=♪';}}/>
              <div className="hero-value">{tracks[0].name}</div><div className="hero-meta">{(tracks[0].artists||[]).map(a=>a.name).join(', ')}</div></>}
            </div>
            <div className="hero-card">
              <div className="hero-label">🎤 Top Artist</div>
              {artists[0]&&<><img className="hero-img circle" src={artists[0].images?.[0]?.url||''} alt={artists[0].name} onError={e=>{e.target.src='https://via.placeholder.com/72/222/555?text=♪';}}/>
              <div className="hero-value">{artists[0].name}</div><div className="hero-meta">{genres[0]||'Artist'}</div></>}
            </div>
            <div className="hero-card">
              <div className="hero-label">💿 Top Album</div>
              {albums[0]&&<><img className="hero-img" src={albums[0].images?.[0]?.url||''} alt={albums[0].name} onError={e=>{e.target.src='https://via.placeholder.com/72/222/555?text=♪';}}/>
              <div className="hero-value">{albums[0].name}</div><div className="hero-meta">{(albums[0].artists||[]).map(a=>a.name).join(', ')}</div></>}
            </div>
          </div>
          <div className="stats-row">
            <div className="stat-block"><span className="stat-icon">🎵</span><div className="stat-number">{tracks.length}</div><div className="stat-label">Top tracks</div></div>
            <div className="stat-block"><span className="stat-icon">🎤</span><div className="stat-number">{artists.length}</div><div className="stat-label">Top artists</div></div>
            <div className="stat-block"><span className="stat-icon">📅</span><div className="stat-number">{topDecade||'—'}</div><div className="stat-label">Your top era</div></div>
          </div>
          <VibeBanner tracks={tracks} genres={genres}/>
          <ShowMoreSection title="Top Tracks" items={tracks} initialCount={5} step={5} containerClass="track-list"
            renderItem={(t,i)=><TrackRow key={t.id} track={t} index={i} showTime={false}/>}/>
          <ShowMoreSection title="Top Artists" items={artists} initialCount={5} step={5} containerClass="artists-grid"
            renderItem={(a,i)=><ArtistCard key={a.id} artist={a} index={i}/>}/>
          <ShowMoreSection title="Top Albums" items={albums} initialCount={5} step={5} containerClass="albums-flex"
            renderItem={(a,i)=><AlbumCard key={a.id} album={a} index={i}/>}/>
          {recent.length>0&&(
            <ShowMoreSection title="Recently Played" items={recent} initialCount={5} step={5} containerClass="track-list"
              renderItem={(t,i)=><TrackRow key={t.id+'-'+i} track={t} index={i} showTime={true}/>}/>
          )}
          <div className="share-section">
            <div className="share-text"><h3>Share your Wrapped</h3><p>Let the world know what you've been listening to</p></div>
            <div className="share-buttons">
              <button className="btn-share twitter" onClick={tweetShare}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.264 5.633 5.9-5.633zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                Tweet
              </button>
              <button className="btn-share copy" onClick={handleShare}>📋 Copy Stats</button>
            </div>
          </div>
        </>
      )}
      {showCopied&&<div className="copied-toast">✓ Copied to clipboard!</div>}
    </div>
  );
}

function App(){
  const [token,setToken]=useState(()=>sessionStorage.getItem('spotify_token'));
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const code=p.get('code'),err=p.get('error');
    setDebug(code?'Got callback...':err?'Error: '+err:'Ready');
    if(err){setError('Login cancelled: '+err);window.history.replaceState({},'','/');return;}
    if(code){
      window.history.replaceState({},'','/');setLoading(true);
      exchangeToken(code)
        .then(d=>{sessionStorage.setItem('spotify_token',d.access_token);setToken(d.access_token);})
        .catch(e=>{setDebug('Error: '+e.message);setError(e.message);})
        .finally(()=>setLoading(false));
    }
  },[]);
  return(
    <div id="app">
      <div className="bg-orbs"><div className="orb orb1"/><div className="orb orb2"/><div className="orb orb3"/></div>
      {loading&&<LoadingScreen message="Connecting to Spotify…"/>}
      {error&&!loading&&(
        <div className="login-screen">
          <div className="error-card" style={{maxWidth:440}}>⚠️ {error}</div>
          <button className="btn-login" style={{marginTop:24}} onClick={()=>{setError(null);localStorage.clear();}}>Try Again</button>
        </div>
      )}
      {!loading&&!error&&!token&&<LoginScreen/>}
      {!loading&&!error&&token&&<Dashboard token={token} onLogout={()=>{sessionStorage.removeItem('spotify_token');setToken(null);}}/>}
      <div id="debug-bar" className="debug-bar">🎵 Ready</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
